server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
      force-response: true

spring:
  config:
    import:
      - optional:classpath:application-local.yml
      - optional:file:./application-local.yml
      - optional:file:./config/application-local.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/china_hydrology_monitor}
    username: ${DB_USERNAME:change_me}
    password: ${DB_PASSWORD:change_me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

  cache:
    type: redis
    redis:
      time-to-live: 4200000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

amap:
  key: ${AMAP_KEY:change_me}
  security-js-code: ${AMAP_SECURITY_JS_CODE:change_me}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.baluga.module.waterlevel.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true

logging:
  level:
    com.baluga.module.waterlevel.mapper: DEBUG
