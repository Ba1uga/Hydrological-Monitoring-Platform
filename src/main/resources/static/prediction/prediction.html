<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水质水位预测中心</title>
    <script src="/index/js/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.6.0/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 214, 255, 0.08), transparent 18%),
                linear-gradient(135deg, #08131f 0%, #0f2033 48%, #16283f 100%);
            color: #e6f7ff;
            min-height: 100dvh;
            padding: 0;
            overflow: hidden;
        }

        .dash-nav {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
            min-width: 48px;
            min-height: 38px;
            border-radius: 50px;
            background: rgba(13, 32, 60, 0.75);
            border: 1px solid rgba(52, 134, 218, 0.45);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(6px);
        }

        .dash-nav input {
            width: 28px;
            height: 28px;
            opacity: 0;
            cursor: pointer;
            z-index: 3;
        }

        .dash-nav > span {
            position: absolute;
            left: 16px;
            top: calc(50% - 6px);
            width: 18px;
            height: 2px;
            background: rgba(255,255,255,0.75);
            border-radius: 15px;
            transition: transform 0.3s ease-in-out, top 0.3s ease-in-out 0.3s, background 0.3s ease-in-out;
            pointer-events: none;
        }

        .dash-nav > span:nth-of-type(1) {
            top: calc(50% - 6px);
        }

        .dash-nav > span:nth-of-type(2) {
            top: calc(50% + 2px);
        }

        .dash-nav ul {
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0;
            padding: 0;
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.5s;
        }

        .dash-nav ul li {
            margin: 0;
        }

        .dash-nav ul li a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            position: relative;
            transition: transform 260ms cubic-bezier(.2,.8,.2,1), filter 260ms cubic-bezier(.2,.8,.2,1), color 260ms cubic-bezier(.2,.8,.2,1);
            will-change: transform;
        }

        .dash-nav ul li a:hover {
            color: #07e5ff;
            transform: translateY(-2px) scale(1.12);
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
        }

        .dash-nav .nav-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: static;
            width: auto;
            height: auto;
            background: none;
            transition: none;
        }

        .dash-nav .nav-text {
            display: none;
        }

        .dash-nav input:checked ~ ul {
            width: 220px;
            overflow: visible;
            justify-content: space-between;
            padding: 0 12px;
        }

        .dash-nav input:checked ~ span:nth-of-type(1) {
            top: calc(50% - 1px);
            transform: rotate(-45deg);
            background: #07e5ff;
        }

        .dash-nav input:checked ~ span:nth-of-type(2) {
            top: calc(50% - 1px);
            transform: rotate(45deg);
            background: #07e5ff;
        }

        .dash-nav ul li a[data-title]:hover::after {
            content: attr(data-title);
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(13, 32, 60, 0.92);
            border: 1px solid rgba(52, 134, 218, 0.45);
            font-size: 12px;
            color: rgba(255,255,255,0.92);
            white-space: nowrap;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.35);
        }

        .dash-nav ul li a[data-title]:hover::before {
            content: "";
            position: absolute;
            top: calc(100% + 2px);
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid rgba(52, 134, 218, 0.45);
            z-index: 10000;
            pointer-events: none;
        }

        .dash-nav ul li a:hover .nav-icon {
            animation: navPop 420ms cubic-bezier(.2,.8,.2,1);
        }

        .dash-nav ul li a:active {
            transform: translateY(0) scale(0.96);
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
        }

        .dash-nav ul li a:focus-visible {
            outline: 2px solid rgba(52, 134, 218, 0.65);
            outline-offset: 2px;
            border-radius: 10px;
        }

        @keyframes navPop {
            0% { transform: scale(1); }
            35% { transform: scale(1.35); }
            65% { transform: scale(0.95); }
            100% { transform: scale(1.12); }
        }

        .container {
            width: 100%;
            max-width: none;
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .header {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 92px;
            padding: 10px 24px;
            border-radius: 18px;
            background: rgba(21, 33, 52, 0.95);
            border: 1px solid rgba(77, 171, 247, 0.22);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
            flex-shrink: 0;
            overflow: visible;
        }

        .header-left {
            min-width: 0;
            width: 100%;
            padding-left: min(260px, 22vw);
            padding-right: min(260px, 22vw);
            display: flex;
            justify-content: center;
        }

        .header-left h1 {
            font-size: clamp(1.7rem, 1.24rem + 0.8vw, 2.35rem);
            letter-spacing: 1.5px;
            background: linear-gradient(180deg, #fdfeff, #9fd8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            padding: 0 18px;
            line-height: 1.15;
            white-space: normal;
            word-break: break-word;
            text-align: center;
        }

        .header-left h1::before,
        .header-left h1::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, rgba(80, 199, 255, 0.1), rgba(80, 199, 255, 0.9));
        }

        .header-left h1::before {
            left: -28px;
        }

        .header-left h1::after {
            right: -28px;
            transform: scaleX(-1);
        }

        .header-right {
            position: absolute;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: min(320px, 28vw);
        }

        .time-info {
            text-align: right;
            font-family: "Courier New", Consolas, monospace;
            font-size: 0.95rem;
            font-weight: 700;
            color: #00f0ff;
            line-height: 1.35;
            letter-spacing: 1px;
            padding: 6px 10px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            background: rgba(0, 20, 40, 0.6);
            box-shadow: 0 0 14px rgba(0, 240, 255, 0.18);
            backdrop-filter: blur(4px);
        }

        .main-content {
            display: grid;
            grid-template-columns: minmax(260px, 18vw) minmax(0, 1fr) minmax(260px, 18vw);
            grid-template-rows: minmax(360px, 1.02fr) minmax(300px, 0.84fr);
            grid-template-areas:
                "left map right"
                "left forecast right";
            gap: 10px;
            flex: 1;
            min-height: 0;
            height: auto;
            min-width: 0;
        }

        .left-panel,
        .right-panel {
            display: grid;
            gap: 10px;
            height: 100%;
            min-height: 0;
            min-width: 0;
        }

        .left-panel {
            grid-area: left;
            grid-template-rows: minmax(118px, 0.24fr) minmax(118px, 0.24fr) minmax(240px, 0.52fr);
        }

        .right-panel {
            grid-area: right;
            grid-template-rows: minmax(236px, 0.44fr) minmax(320px, 0.78fr) minmax(160px, 0.44fr);
        }

        .panel,
        .chart-panel,
        .map-panel,
        .warning-panel,
        .radar-panel {
            background: rgba(22, 34, 54, 0.96);
            border-radius: 16px;
            border: 1px solid rgba(77, 171, 247, 0.18);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
            padding: 14px;
            min-height: 0;
            overflow: visible;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .panel-header,
        .left-chart-header,
        .right-chart-header,
        .radar-header,
        .warning-header,
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-bottom: 10px;
        }

        .left-chart-title,
        .right-chart-title,
        .chart-title,
        .warning-title,
        .radar-title {
            color: #82d7ff;
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.35;
            white-space: normal;
            word-break: break-word;
            flex: 1 1 180px;
        }

        .left-chart-subtitle,
        .chart-subtitle,
        .radar-station {
            color: #4dabf7;
            font-size: 0.84rem;
            font-weight: 600;
            line-height: 1.4;
            white-space: normal;
            word-break: break-word;
            min-width: 0;
        }

        .left-chart-container,
        .right-chart-container,
        .radar-container,
        .warning-container,
        .chart-container,
        #map {
            width: 100%;
            flex: 1;
            height: auto;
            min-height: 0;
            border-radius: 10px;
            border: 1px solid rgba(77, 171, 247, 0.14);
            background: rgba(9, 19, 33, 0.74);
            overflow: hidden;
        }

        .map-panel {
            grid-area: map;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
            min-width: 0;
        }

        .chart-panel {
            grid-area: forecast;
        }

        .map-container {
            position: relative;
            min-height: 0;
            flex: 1;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(77, 171, 247, 0.14);
            background: rgba(9, 19, 33, 0.74);
        }

        #map {
            height: 100%;
            border: none;
            background: rgba(9, 19, 33, 0.74);
        }

        .map-legend {
            position: absolute;
            left: 16px;
            bottom: 16px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(17, 28, 46, 0.9);
            border: 1px solid rgba(77, 171, 247, 0.2);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
        }

        .legend-grid {
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 8px 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #d9f1ff;
            font-size: 0.8rem;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .prediction-controls {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            flex-wrap: wrap;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(26, 40, 64, 0.96);
            border: 1px solid rgba(77, 171, 247, 0.18);
        }

        .prediction-range {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            flex: 1 1 220px;
        }

        .range-label {
            color: #d8f4ff;
            font-size: 0.95rem;
        }

        .range-input {
            width: 72px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(77, 171, 247, 0.25);
            background: rgba(8, 20, 34, 0.82);
            color: #e6f7ff;
            font-size: 0.95rem;
            min-height: 44px;
        }

        .predict-btn {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            color: #ffffff;
            background: linear-gradient(135deg, #25cf92, #16a66f);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(22, 166, 111, 0.24);
            transition: transform 0.2s ease, filter 0.2s ease;
            min-height: 44px;
            flex: 0 1 auto;
        }

        .predict-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }

        .predict-btn:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .radar-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .radar-btn {
            border: 1px solid rgba(77, 171, 247, 0.28);
            border-radius: 999px;
            padding: 5px 12px;
            background: rgba(12, 24, 38, 0.82);
            color: #d8f4ff;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
            font-size: 0.76rem;
        }

        .radar-btn:hover {
            background: rgba(77, 171, 247, 0.14);
            transform: translateY(-1px);
        }

        .radar-indicator {
            color: #7bc9f6;
            font-size: 0.82rem;
        }

        .right-flip-panel {
            min-height: 0;
            overflow: hidden;
        }

        .right-flip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 12px;
            margin-bottom: 10px;
        }

        .right-flip-title {
            flex: 1 1 180px;
            min-width: 0;
            transition: opacity 0.28s ease;
        }

        .right-flip-controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .right-flip-btn {
            min-width: 78px;
            padding-inline: 10px;
        }

        .right-flip-indicator {
            min-width: 52px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .right-flip-viewport {
            position: relative;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .right-flip-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        .right-flip-slide {
            display: flex;
            flex: 0 0 100%;
            min-width: 100%;
            min-height: 0;
            opacity: 0.72;
            transform: translateX(0) scale(0.985);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .right-flip-slide.is-active {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .right-flip-slide .right-chart-container {
            flex: 1;
        }

        .warning-header {
            margin-bottom: 8px;
        }

        .warning-count {
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(255, 87, 34, 0.16);
            color: #ff9a7a;
            font-size: 0.76rem;
            font-weight: 700;
        }

        .warning-container {
            position: relative;
            height: calc(100% - 44px);
            min-height: 0;
        }

        .warning-slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .warning-item {
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 10px 11px;
            background: linear-gradient(135deg, rgba(31, 45, 69, 0.95), rgba(18, 31, 49, 0.95));
            border: 1px solid rgba(77, 171, 247, 0.14);
            opacity: 0;
            transform: translateX(40px) scale(0.98);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            overflow: auto;
        }

        .warning-item.active,
        .warning-item.next,
        .warning-item.prev {
            opacity: 1;
            pointer-events: auto;
        }

        .warning-item.active {
            transform: translateX(0) scale(1);
            z-index: 3;
        }

        .warning-item.next {
            transform: translateX(18px) scale(0.97);
            opacity: 0.4;
            z-index: 2;
        }

        .warning-item.prev {
            transform: translateX(-18px) scale(0.97);
            opacity: 0.2;
            z-index: 1;
        }

        .warning-item.critical {
            border-color: rgba(255, 87, 34, 0.4);
        }

        .warning-item.high {
            border-color: rgba(255, 152, 0, 0.4);
        }

        .warning-item.medium {
            border-color: rgba(77, 171, 247, 0.3);
        }

        .warning-type {
            color: #80d4ff;
            font-size: 0.76rem;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .warning-content {
            color: #e6f7ff;
            font-size: 0.82rem;
            line-height: 1.5;
            margin-bottom: 6px;
            display: block;
            overflow: visible;
        }

        .warning-station {
            color: #b3e0ff;
            font-size: 0.74rem;
        }

        .custom-marker {
            width: 28px !important;
            height: 28px !important;
            border-radius: 50% !important;
            border: 2px solid #ffffff !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            font-size: 12px !important;
            cursor: pointer !important;
            transform: translate(-50%, -50%) !important;
            transition: all 0.25s ease !important;
            box-shadow: 0 0 10px currentColor;
        }

        .active-marker {
            animation: pulseActive 1.5s infinite !important;
            transform: translate(-50%, -50%) scale(1.15) !important;
        }

        .warning-marker {
            animation: pulseWarning 1.8s infinite !important;
        }

        @keyframes pulseActive {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(77, 171, 247, 0.6);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(77, 171, 247, 0);
            }
        }

        @keyframes pulseWarning {
            0%, 100% {
                box-shadow: 0 0 0 currentColor;
            }
            50% {
                box-shadow: 0 0 16px currentColor;
            }
        }

        .map-info-window {
            position: absolute;
            width: 220px;
            padding: 12px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(20, 30, 45, 0.98), rgba(25, 40, 60, 0.98));
            border: 1.5px solid rgba(77, 171, 247, 0.8);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
            color: #e6f7ff;
            font-size: 0.82rem;
            z-index: 1000;
            animation: slideIn 0.25s ease-out;
            backdrop-filter: blur(6px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-8px, 8px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            to {
                opacity: 0;
                transform: translate(8px, -8px) scale(0.96);
            }
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(77, 171, 247, 0.24);
        }

        .info-title {
            color: #80d4ff;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .info-close {
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 87, 34, 0.18);
            color: #ff7d58;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .info-close:hover {
            background: rgba(255, 87, 34, 0.28);
            transform: scale(1.05);
        }

        .info-location {
            color: #b3e0ff;
            font-size: 0.78rem;
            margin-bottom: 10px;
        }

        .info-quality {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .quality-class {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .quality-i {
            background: rgba(0, 168, 84, 0.18);
            color: #00a854;
        }

        .quality-ii {
            background: rgba(163, 217, 48, 0.18);
            color: #a3d930;
        }

        .quality-iii {
            background: rgba(248, 231, 28, 0.18);
            color: #f8e71c;
        }

        .quality-iv {
            background: rgba(255, 152, 0, 0.18);
            color: #ff9800;
        }

        .quality-v {
            background: rgba(255, 87, 34, 0.18);
            color: #ff5722;
        }

        .info-trend {
            font-size: 0.75rem;
        }

        .trend-improve {
            color: #37d3a0;
        }

        .trend-decline {
            color: #ff7d58;
        }

        .trend-stable {
            color: #4dabf7;
        }

        .info-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .info-metric {
            padding: 7px 8px;
            border-radius: 8px;
            background: rgba(9, 19, 33, 0.7);
            text-align: center;
        }

<script>
    const API_BASE_URL = '/api/prediction/stations';

    const WARNING_API_BASE_URL = '/api/prediction/warnings';

    const DATA_API_BASE_URL = '/api/prediction/data';

    const API_ENDPOINTS = {
        STATIONS: `${API_BASE_URL}/frontend/all`,
        STATS_CANDIDATES: [
            `${API_BASE_URL}/frontend/stats/map`,
            `${API_BASE_URL}/frontend/stats`,
            `${API_BASE_URL}/summary`
        ],
        WARNINGS: `${WARNING_API_BASE_URL}/frontend/all`,
        RUN_PREDICTION: `${DATA_API_BASE_URL}/prediction/run`
    };

    let amapLoadPromise = null;
    let map = null;
    let markers = [];
    let currentChart = null;
    let radarChart = null;
    let leftChart1 = null;
    let leftChart2 = null;
    let leftChart3 = null;
    let rightChart1 = null;
    let rightChart2 = null;
    const RIGHT_FLIP_PAGES = ['📋 污染指标排行', '📌 站点状态分布'];

    let monitoringStations = [];
    let warningData = [];
    let predictionStats = {
        totalStations: 0,
        normalStations: 0,
        warningStations: 0,
        criticalStations: 0,
        qualityDistribution: {}
    };

    let selectedStationId = null;
    let radarStationIndex = 0;
    let rightFlipPageIndex = 0;
    let currentWarningIndex = 0;
    let warningInterval = null;
    let radarInterval = null;
    let currentInfoWindow = null;

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function safeNumber(value, fallback = 0) {
        const numeric = Number(value);
        return Number.isFinite(numeric) ? numeric : fallback;
    }

    function normalizeQualityClass(value) {
        if (!value) return '未知';
        return String(value);
    }

    function qualityClassCss(qualityClass) {
        switch (qualityClass) {
            case 'I类':
                return 'quality-i';
            case 'II类':
                return 'quality-ii';
            case 'III类':
                return 'quality-iii';
            case 'IV类':
                return 'quality-iv';
            case 'V类':
                return 'quality-v';
            default:
                return 'quality-iii';
        }
    }

    function getStationStatusLabel(status) {
        switch (String(status || '').toLowerCase()) {
            case 'normal':
                return '正常';
            case 'warning':
                return '预警';
            case 'critical':
                return '危险';
            default:
                return '关注';
        }
    }

    function getStationStatusColor(status) {
        switch (String(status || '').toLowerCase()) {
            case 'normal':
                return '#00a854';
            case 'warning':
                return '#f8e71c';
            case 'critical':
                return '#ff5722';
            default:
                return '#4dabf7';
        }
    }

    function getWarningLevelClass(level) {
        const normalized = String(level || '').toLowerCase();
        if (normalized === 'serious' || normalized === 'critical') return 'critical';
        if (normalized === 'warning' || normalized === 'high') return 'high';
        return 'medium';
    }

    function normalizeWarningForUI(raw) {
        if (!raw || typeof raw !== 'object') return null;
        return {
            id: raw.id,
            type: raw.type || raw.warningType || '站点预警',
            level: getWarningLevelClass(raw.level || raw.warningLevel),
            stationId: raw.stationId,
            stationName: raw.stationName || '监测站点',
            parameter: raw.parameter || '',
            value: raw.value || '--',
            threshold: raw.threshold || '--',
            time: raw.time || raw.warningTime || '',
            description: raw.description || '暂无预警描述',
            status: raw.status || 'active'
        };
    }

    function normalizeStation(raw) {
        if (!raw || typeof raw !== 'object') return null;
        const coordinates = Array.isArray(raw.coordinates) && raw.coordinates.length === 2
            ? [safeNumber(raw.coordinates[0]), safeNumber(raw.coordinates[1])]
            : null;
        const waterQuality = raw.waterQuality && typeof raw.waterQuality === 'object'
            ? raw.waterQuality
            : {};
        return {
            id: raw.id,
            name: raw.name || `监测站点${raw.id ?? ''}`,
            type: raw.type || '监测站点',
            location: raw.location || '未知位置',
            river: raw.river || '未知流域',
            tags: Array.isArray(raw.tags) ? raw.tags : [],
            coordinates,
            status: raw.status || 'warning',
            qualityClass: normalizeQualityClass(raw.qualityClass),
            color: raw.color || getStationStatusColor(raw.status),
            icon: raw.icon || String(raw.name || '站').charAt(0),
            trend: raw.trend || '趋势稳定',
            waterQuality: {
                pH: safeNumber(waterQuality.pH, 7.0),
                DO: safeNumber(waterQuality.DO, safeNumber(waterQuality.dissolvedOxygen, 5.0)),
                COD: safeNumber(waterQuality.COD, safeNumber(waterQuality.cod, 10.0)),
                NH3N: safeNumber(waterQuality.NH3N, safeNumber(waterQuality.ammoniaNitrogen, 0.5)),
                level: safeNumber(waterQuality.level, safeNumber(raw.waterLevel, 20.0))
            }
        };
    }

    async function fetchAmapConfig() {
        const response = await fetch('/api/config/amap');
        if (!response.ok) {
            throw new Error(`高德地图配置加载失败: ${response.status}`);
        }
        return response.json();
    }

    function loadAmapScript(config) {
        return new Promise((resolve, reject) => {
            if (typeof AMap !== 'undefined') {
                resolve();
                return;
            }

            window._AMapSecurityConfig = {
                securityJsCode: config.securityJsCode || ''
            };

            const script = document.createElement('script');
            script.src = `https://webapi.amap.com/maps?v=2.0&key=${config.key}&plugin=AMap.ToolBar,AMap.Scale`;
            script.onload = resolve;
            script.onerror = () => reject(new Error('高德地图脚本加载失败'));
            document.head.appendChild(script);
        });
    }

    async function ensureAmapLoaded() {
        if (typeof AMap !== 'undefined') return;
        if (!amapLoadPromise) {
            amapLoadPromise = fetchAmapConfig().then(loadAmapScript);
        }
        return amapLoadPromise;
    }

    const api = {
        async get(url) {
            const response = await axios.get(url, {
                timeout: 8000,
                headers: {
                    Accept: 'application/json',
                    'Content-Type': 'application/json'
                }
            });
            if (response.data && response.data.code !== undefined) {
                if (response.data.code === 200) {
                    return response.data.data;
                }
                throw new Error(response.data.message || response.data.msg || '接口返回失败');
            }
            return response.data;
        },
        async post(url, payload) {
            const response = await axios.post(url, payload, {
                timeout: 10000,
                headers: {
                    Accept: 'application/json',
                    'Content-Type': 'application/json'
                }
            });
            if (response.data && response.data.code !== undefined) {
                if (response.data.code === 200) {
                    return response.data.data;
                }
                throw new Error(response.data.message || response.data.msg || '接口返回失败');
            }
            return response.data;
        },
        async tryMultiple(urls) {
            for (const url of urls) {
                try {
                    const result = await this.get(url);
                    if (result !== null && result !== undefined) {
                        return result;
                    }
                } catch (error) {
                    continue;
                }
            }
            return null;
        }
    };

    function buildStatsFromStations(stations) {
        const stats = {
            totalStations: stations.length,
            normalStations: 0,
            warningStations: 0,
            criticalStations: 0,
            qualityDistribution: {
                I类: 0,
                II类: 0,
                III类: 0,
                IV类: 0,
                V类: 0
            }
        };

        stations.forEach(station => {
            const status = String(station.status || '').toLowerCase();
            if (status === 'normal') stats.normalStations += 1;
            else if (status === 'warning') stats.warningStations += 1;
            else if (status === 'critical') stats.criticalStations += 1;
            else stats.warningStations += 1;

            const qualityClass = normalizeQualityClass(station.qualityClass);
            if (stats.qualityDistribution[qualityClass] !== undefined) {
                stats.qualityDistribution[qualityClass] += 1;
            }
        });

        return stats;
    }

    function normalizeStats(raw, stations) {
        const fallback = buildStatsFromStations(stations);
        if (!raw || typeof raw !== 'object') {
            return fallback;
        }
        return {
            totalStations: safeNumber(raw.totalStations ?? raw.total, fallback.totalStations),
            normalStations: safeNumber(raw.normalStations ?? raw.normalCount, fallback.normalStations),
            warningStations: safeNumber(raw.warningStations ?? raw.warningCount, fallback.warningStations),
            criticalStations: safeNumber(raw.criticalStations ?? raw.criticalCount, fallback.criticalStations),
            qualityDistribution: raw.qualityDistribution && typeof raw.qualityDistribution === 'object'
                ? raw.qualityDistribution
                : fallback.qualityDistribution
        };
    }

    async function fetchData() {
        try {
            const stationRows = await api.get(API_ENDPOINTS.STATIONS);
            monitoringStations = Array.isArray(stationRows)
                ? stationRows.map(normalizeStation).filter(Boolean)
                : [];

            if (!monitoringStations.length) {
                showNotification('未加载到真实站点数据', 'warning');
            }

            const statsResponse = await api.tryMultiple(API_ENDPOINTS.STATS_CANDIDATES);
            predictionStats = normalizeStats(statsResponse, monitoringStations);

            const warningRows = await api.get(API_ENDPOINTS.WARNINGS);
            warningData = Array.isArray(warningRows)
                ? warningRows.map(normalizeWarningForUI).filter(Boolean)
                : [];

            if (!warningData.length) {
                showNotification('未加载到真实预警数据', 'warning');
            }

            if (monitoringStations.length > 0) {
                selectedStationId = monitoringStations[0].id;
            }

            return monitoringStations.length > 0;
        } catch (error) {
            console.error('真实数据加载失败，请检查后端接口', error);
            monitoringStations = [];
            warningData = [];
            predictionStats = buildStatsFromStations([]);
            selectedStationId = null;
            showNotification('真实数据加载失败，请检查后端接口', 'error');
            return false;
        }
    }

    function updateDateTime() {
        const now = new Date();
        const currentDate = document.getElementById('currentDate');
        const currentTime = document.getElementById('currentTime');
        if (currentDate) {
            currentDate.textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
        }
        if (currentTime) {
            currentTime.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
    }

    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.style.position = 'fixed';
        notification.style.top = '20px';
        notification.style.right = '20px';
        notification.style.padding = '10px 15px';
        notification.style.borderRadius = '6px';
        notification.style.zIndex = '10000';
        notification.style.fontSize = '0.85rem';
        notification.style.maxWidth = '280px';
        notification.style.boxShadow = '0 4px 12px rgba(0, 0, 0, 0.5)';
        notification.style.transition = 'all 0.3s';
        notification.style.transform = 'translateX(100px)';
        notification.style.opacity = '0';
        notification.style.color = '#ffffff';

        if (type === 'success') {
            notification.style.background = 'linear-gradient(135deg, rgba(0, 168, 84, 0.9), rgba(0, 135, 68, 0.9))';
            notification.style.border = '1px solid rgba(0, 168, 84, 0.6)';
        } else if (type === 'error') {
            notification.style.background = 'linear-gradient(135deg, rgba(255, 87, 34, 0.9), rgba(200, 60, 20, 0.9))';
            notification.style.border = '1px solid rgba(255, 87, 34, 0.6)';
        } else if (type === 'warning') {
            notification.style.background = 'linear-gradient(135deg, rgba(255, 152, 0, 0.9), rgba(200, 120, 0, 0.9))';
            notification.style.border = '1px solid rgba(255, 152, 0, 0.6)';
        } else {
            notification.style.background = 'linear-gradient(135deg, rgba(77, 171, 247, 0.9), rgba(50, 130, 200, 0.9))';
            notification.style.border = '1px solid rgba(77, 171, 247, 0.6)';
        }

        notification.textContent = message;
        document.body.appendChild(notification);

        requestAnimationFrame(() => {
            notification.style.transform = 'translateX(0)';
            notification.style.opacity = '1';
        });

        setTimeout(() => {
            notification.style.transform = 'translateX(100px)';
            notification.style.opacity = '0';
            setTimeout(() => notification.remove(), 300);
        }, 2600);
    }

    function generateMonthlyData(baseValue) {
        const base = safeNumber(baseValue, 0);
        return Array.from({ length: 6 }, (_, index) => {
            const wave = Math.sin((index + 1) * Math.PI / 6) * 0.08;
            return Number((base * (1 + wave)).toFixed(2));
        });
    }

    function getStationColor(station, alpha = 1) {
        const colorMap = {
            'I类': '#00a854',
            'II类': '#a3d930',
            'III类': '#f8e71c',
            'IV类': '#ff9800',
            'V类': '#ff5722'
        };
        const baseColor = colorMap[station?.qualityClass] || '#4dabf7';

        if (alpha === 1) {
            return baseColor;
        }

        const r = parseInt(baseColor.slice(1, 3), 16);
        const g = parseInt(baseColor.slice(3, 5), 16);
        const b = parseInt(baseColor.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function parseDateValue(value) {
        if (!value) return null;
        const parsed = new Date(value);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatAnchorDate(value) {
        const parsed = value instanceof Date ? value : parseDateValue(value);
        if (!parsed) return '';
        const year = parsed.getFullYear();
        const month = String(parsed.getMonth() + 1).padStart(2, '0');
        const day = String(parsed.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function buildChartSourceMeta(historicalResponse, predictionRows) {
        const historicalAnchor = historicalResponse && typeof historicalResponse === 'object'
            ? parseDateValue(historicalResponse.anchorTime)
            : null;
        const predictionDates = predictionRows
            .map(item => parseDateValue(item && item.dataTime ? item.dataTime : null))
            .filter(Boolean);
        const predictionAnchor = predictionDates.length ? predictionDates[predictionDates.length - 1] : null;
        const predictionUsedFallback = predictionDates.some(item => item.getTime() < Date.now());
        const anchors = [historicalAnchor, predictionAnchor].filter(Boolean);
        const anchorTime = anchors.length
            ? new Date(Math.max.apply(null, anchors.map(item => item.getTime())))
            : null;
        const usedFallback = Boolean(historicalResponse && historicalResponse.usedFallback) || predictionUsedFallback;

        return {
            sourceMode: historicalResponse && typeof historicalResponse === 'object'
                ? historicalResponse.sourceMode || 'CURRENT_WINDOW'
                : 'CURRENT_WINDOW',
            usedFallback,
            anchorTime,
            label: anchorTime
                ? `${usedFallback ? '最新可用数据，截至 ' : '当前时间窗口，截至 '}${formatAnchorDate(anchorTime)}`
                : (usedFallback ? '最新可用数据' : '当前时间窗口')
        };
    }

    async function loadChartData(stationId, days) {
        const historicalResponse = await api.get(`${DATA_API_BASE_URL}/historical/${stationId}?days=10`);
        const predictionResponse = await api.get(`${DATA_API_BASE_URL}/prediction/${stationId}?days=${days}`);

        const historical = historicalResponse && typeof historicalResponse === 'object'
            ? {
                dates: Array.isArray(historicalResponse.dates) ? historicalResponse.dates : [],
                pH: Array.isArray(historicalResponse.pH) ? historicalResponse.pH.map(item => safeNumber(item, null)) : [],
                DO: Array.isArray(historicalResponse.DO) ? historicalResponse.DO.map(item => safeNumber(item, null)) : [],
                COD: Array.isArray(historicalResponse.COD) ? historicalResponse.COD.map(item => safeNumber(item, null)) : [],
                level: Array.isArray(historicalResponse.level) ? historicalResponse.level.map(item => safeNumber(item, null)) : []
            }
            : { dates: [], pH: [], DO: [], COD: [], level: [] };

        const predictionRows = Array.isArray(predictionResponse) ? predictionResponse : [];
        const prediction = {
            dates: predictionRows.map(item => item.date || ''),
            pH: predictionRows.map(item => safeNumber(item.pH, null)),
            DO: predictionRows.map(item => safeNumber(item.dissolvedOxygen, null)),
            COD: predictionRows.map(item => safeNumber(item.cod, null)),
            level: predictionRows.map(item => safeNumber(item.waterLevel, null)),
            anchorTime: predictionRows.length ? predictionRows[predictionRows.length - 1].dataTime || null : null
        };

        return {
            historical,
            prediction,
            sourceMeta: buildChartSourceMeta(historicalResponse, predictionRows)
        };
    }

    function mergeSeries(historical, prediction, key) {
        return historical[key].concat(prediction[key]);
    }

    function mergePredictionSeries(historical, prediction, key) {
        return historical[key].map(() => null).concat(prediction[key]);
    }

    async function loadChartData(stationId, days) {
        const historicalResponse = await api.get(`${DATA_API_BASE_URL}/historical/${stationId}?days=10`);
        const predictionResponse = await api.get(`${DATA_API_BASE_URL}/prediction/${stationId}?days=${days}`);

        const historical = historicalResponse && typeof historicalResponse === 'object'
            ? {
                dates: Array.isArray(historicalResponse.dates) ? historicalResponse.dates : [],
                pH: Array.isArray(historicalResponse.pH) ? historicalResponse.pH.map(item => safeNumber(item, null)) : [],
                DO: Array.isArray(historicalResponse.DO) ? historicalResponse.DO.map(item => safeNumber(item, null)) : [],
                COD: Array.isArray(historicalResponse.COD) ? historicalResponse.COD.map(item => safeNumber(item, null)) : [],
                level: Array.isArray(historicalResponse.level) ? historicalResponse.level.map(item => safeNumber(item, null)) : []
            }
            : { dates: [], pH: [], DO: [], COD: [], level: [] };

        const predictionRows = Array.isArray(predictionResponse) ? predictionResponse : [];
        const prediction = {
            dates: predictionRows.map(item => item.date || ''),
            pH: predictionRows.map(item => safeNumber(item.pH, null)),
            DO: predictionRows.map(item => safeNumber(item.dissolvedOxygen, null)),
            COD: predictionRows.map(item => safeNumber(item.cod, null)),
            level: predictionRows.map(item => safeNumber(item.waterLevel, null)),
            anchorTime: predictionRows.length ? predictionRows[predictionRows.length - 1].dataTime || null : null
        };

        return {
            historical,
            prediction,
            sourceMeta: buildChartSourceMeta(historicalResponse, predictionRows)
        };
    }

    async function updateChartData() {
        const station = monitoringStations.find(item => item.id === selectedStationId);
        if (!station || !currentChart) return;

        const predictionDaysInput = document.getElementById('predictionDays');
        const days = predictionDaysInput ? Math.max(1, parseInt(predictionDaysInput.value, 10) || 7) : 7;

        try {
            const chartData = await loadChartData(selectedStationId, days);
            renderTrendComparison(station, chartData.historical, chartData.prediction, chartData.sourceMeta);
            renderChart(station, chartData.historical, chartData.prediction, chartData.sourceMeta);
        } catch (error) {
            console.error('图表数据加载失败', error);
            showNotification('未加载到真实历史/预测数据', 'warning');
            setEmptyChart(currentChart, '未加载到真实历史/预测数据');
            setEmptyChart(leftChart3, '未加载到真实历史/预测数据');
        }
    }

    function updateWarningCount() {
        const warningCount = document.getElementById('warningCount');
        if (warningCount) {
            warningCount.textContent = `${warningData.length}条`;
        }
    }

    function updateWarningSlider() {
        const warningSlider = document.getElementById('warningSlider');
        if (!warningSlider) return;

        updateWarningCount();

        if (!warningData.length) {
            warningSlider.innerHTML = '<div class="warning-item active">暂无真实预警数据</div>';
            return;
        }

        warningSlider.innerHTML = warningData.map((warning, index) => {
            let stateClass = '';
            if (index === currentWarningIndex) stateClass = 'active';
            else if (index === (currentWarningIndex + 1) % warningData.length) stateClass = 'next';
            else if (index === (currentWarningIndex - 1 + warningData.length) % warningData.length) stateClass = 'prev';

            return `
                <div class="warning-item ${warning.level} ${stateClass}">
                    <div class="warning-type">${escapeHtml(warning.type)}</div>
                    <div class="warning-content">${escapeHtml(warning.description)}</div>
                    <div class="warning-station">${escapeHtml(warning.stationName)}</div>
                </div>
            `;
        }).join('');
    }

    function startAutoScroll() {
        clearInterval(warningInterval);
        updateWarningSlider();
        if (warningData.length <= 1) return;

        warningInterval = setInterval(() => {
            currentWarningIndex = (currentWarningIndex + 1) % warningData.length;
            updateWarningSlider();
        }, 4000);
    }

    function getActiveRightFlipChart() {
        return rightFlipPageIndex === 0 ? rightChart1 : rightChart2;
    }

    function resizeActiveRightFlipChart() {
        const activeChart = getActiveRightFlipChart();
        if (activeChart) {
            activeChart.resize();
        }
    }

    function updateRightFlipUi() {
        const rightFlipTitle = document.getElementById('rightFlipTitle');
        const rightFlipIndicator = document.getElementById('rightFlipIndicator');
        const rightFlipTrack = document.getElementById('rightFlipTrack');
        const rightFlipSlides = document.querySelectorAll('.right-flip-slide');

        if (rightFlipTitle) {
            rightFlipTitle.textContent = RIGHT_FLIP_PAGES[rightFlipPageIndex];
        }

        if (rightFlipIndicator) {
            rightFlipIndicator.textContent = `${rightFlipPageIndex + 1} / ${RIGHT_FLIP_PAGES.length}`;
        }

        if (rightFlipTrack) {
            rightFlipTrack.style.transform = `translateX(-${rightFlipPageIndex * 100}%)`;
        }

        rightFlipSlides.forEach((slide, index) => {
            slide.classList.toggle('is-active', index === rightFlipPageIndex);
        });
    }

    function updateRightFlipPage(nextIndex) {
        const pageCount = RIGHT_FLIP_PAGES.length;
        rightFlipPageIndex = (nextIndex + pageCount) % pageCount;
        updateRightFlipUi();
        window.requestAnimationFrame(() => {
            resizeActiveRightFlipChart();
        });
    }

    function updateRadarIndicator() {
        const radarIndicator = document.getElementById('radarIndicator');
        if (!radarIndicator) return;
        radarIndicator.textContent = monitoringStations.length
            ? `${radarStationIndex + 1} / ${monitoringStations.length}`
            : '0 / 0';
    }

    function updateRadarStation(index) {
        if (!monitoringStations.length) {
            setEmptyChart(radarChart, '暂无选中站点');
            return;
        }

        radarStationIndex = (index + monitoringStations.length) % monitoringStations.length;
        const station = monitoringStations[radarStationIndex];
        const radarStationName = document.getElementById('radarStationName');
        if (radarStationName) {
            radarStationName.textContent = station.name;
        }
        updateRadarIndicator();
        renderRadarStation(station);

        if (map && station.coordinates) {
            map.setZoomAndCenter(8, station.coordinates);
        }

        markers.forEach((marker, markerIndex) => {
            const markerContent = marker.getContent();
            if (markerContent) {
                if (markerIndex === radarStationIndex) markerContent.classList.add('active-marker');
                else markerContent.classList.remove('active-marker');
            }
        });

        updateSelectedStation(station.id);
    }

    function startRadarAutoScroll() {
        clearInterval(radarInterval);
        if (monitoringStations.length <= 1) return;
        radarInterval = setInterval(() => {
            updateRadarStation(radarStationIndex + 1);
        }, 5000);
    }

    async function runPrediction() {
        const station = monitoringStations.find(item => item.id === selectedStationId);
        if (!station) {
            showNotification('未选中站点，无法运行预测', 'warning');
            return;
        }

        const btn = document.getElementById('runPrediction');
        const originalText = btn ? btn.innerHTML : '';
        const predictionDaysInput = document.getElementById('predictionDays');
        const days = predictionDaysInput ? Math.max(1, parseInt(predictionDaysInput.value, 10) || 7) : 7;

        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '运行中...';
        }

        try {
            const response = await api.post(API_ENDPOINTS.RUN_PREDICTION, { stationId: selectedStationId, days });
            await updateChartData();
            const successMessage = response && response.message
                ? response.message
                : `已刷新未来 ${days} 天的真实预测数据`;
            showNotification(successMessage, 'success');
        } catch (error) {
            console.error('预测失败:', error);
            showNotification('预测接口执行失败', 'error');
        } finally {
            if (btn) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    }

    function bindStaticControls() {
        const prevStation = document.getElementById('prevStation');
        const nextStation = document.getElementById('nextStation');
        const rightFlipPrev = document.getElementById('rightFlipPrev');
        const rightFlipNext = document.getElementById('rightFlipNext');

        if (prevStation) {
            prevStation.addEventListener('click', () => updateRadarStation(radarStationIndex - 1));
        }

        if (nextStation) {
            nextStation.addEventListener('click', () => updateRadarStation(radarStationIndex + 1));
        }

        if (rightFlipPrev) {
            rightFlipPrev.addEventListener('click', () => updateRightFlipPage(rightFlipPageIndex - 1));
        }

        if (rightFlipNext) {
            rightFlipNext.addEventListener('click', () => updateRightFlipPage(rightFlipPageIndex + 1));
        }

        updateRightFlipUi();

        window.addEventListener('resize', () => {
            currentChart && currentChart.resize();
            radarChart && radarChart.resize();
            leftChart1 && leftChart1.resize();
            leftChart2 && leftChart2.resize();
            leftChart3 && leftChart3.resize();
            rightChart1 && rightChart1.resize();
            rightChart2 && rightChart2.resize();
            map && map.resize();
        });
    }

    async function initApplication() {
        try {
            try {
                await ensureAmapLoaded();
            } catch (mapError) {
                console.error('高德地图加载失败:', mapError);
                showNotification('高德地图加载失败，地图功能受限', 'error');
            }

            if (typeof echarts === 'undefined') {
                console.error('ECharts 未加载');
                showNotification('图表库加载失败，部分功能受限', 'error');
                return;
            }

            initializeRadarChart();
            initializeLeftCharts();
            initializeRightCharts();
            updateRightFlipUi();
            initializeChart();
            bindStaticControls();

            showNotification('正在加载数据...', 'info');
            const dataLoaded = await fetchData();
            if (!dataLoaded) {
                showNotification('真实数据加载失败，请检查后端接口', 'warning');
            } else {
                showNotification('数据加载完成', 'success');
            }

            if (typeof AMap !== 'undefined') {
                initializeMap();
            } else {
                const mapElement = document.getElementById('map');
                if (mapElement) {
                    mapElement.innerHTML = '<div style="color: white; text-align: center; padding-top: 180px;">地图加载失败，请检查高德配置</div>';
                }
            }
            updateWarningSlider();

            if (monitoringStations.length > 0) {
                updateRadarStation(0);
            } else {
                setEmptyChart(leftChart1, '未加载到真实站点数据');
                setEmptyChart(leftChart2, '未加载到真实站点数据');
                setEmptyChart(leftChart3, '未加载到真实历史/预测数据');
                setEmptyChart(rightChart1, '未加载到真实站点数据');
                setEmptyChart(rightChart2, '未加载到真实站点数据');
                setEmptyChart(radarChart, '暂无选中站点');
                setEmptyChart(currentChart, '未加载到真实历史/预测数据');
            }

            setInterval(updateDateTime, 1000);
            updateDateTime();
            startAutoScroll();
            startRadarAutoScroll();
        } catch (error) {
            console.error('初始化失败:', error);
            showNotification('初始化失败，请刷新页面后重试', 'error');
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const missingResources = [];
        if (typeof AMap === 'undefined') missingResources.push('高德地图API');
        if (typeof echarts === 'undefined') missingResources.push('ECharts图表库');
        if (typeof axios === 'undefined') missingResources.push('Axios HTTP库');

        if (missingResources.length > 0) {
            showNotification(`部分资源加载失败: ${missingResources.join(', ')}`, 'warning');
        }

        setTimeout(() => {
            initApplication();
        }, 300);
    });
