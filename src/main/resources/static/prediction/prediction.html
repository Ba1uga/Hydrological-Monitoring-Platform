        .warning-item {
            position: absolute;
            width: 100%;
            height: 33.33%;

            border-radius: 8px;
            padding: 12px;
            border-left: 4px solid;
            transition: all 0.5s ease;
            cursor: pointer;

            transform: translateY(100%);

        .warning-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        .warning-item.next {

            z-index: 1;
        }

        .warning-item.prev {

        }

        /* 闁圭厧鐡ㄥú鐔煎磿鐎涙鈹嶉柍鈺佸暕缁?*/

        /* 闂佺厧顨庢禍婊堟偩閻愵剛鈻曞璺侯儑閸ㄥジ鎮规担鍝勵暭闁绘宕?*/
        .custom-marker {
            width: 28px !important;
            height: 28px !important;
            border-radius: 50% !important;
            border: 2px solid white !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: white !important;
            font-weight: bold !important;
            font-size: 12px !important;
            cursor: pointer !important;
            transform: translate(-50%, -50%) !important;
            box-shadow: 0 0 10px currentColor;
            transition: all 0.3s !important;
        }

        .active-marker {
            animation: pulseActive 1.5s infinite !important;
            border-width: 3px !important;
            transform: translate(-50%, -50%) scale(1.2) !important;
        }

        @keyframes pulseActive {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(77, 171, 247, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(77, 171, 247, 0);
            }
        }

        .warning-marker {
            animation: pulseWarning 2s infinite !important;
        }

        @keyframes pulseWarning {
            0%, 100% { box-shadow: 0 0 0 currentColor; }
            50% { box-shadow: 0 0 15px currentColor; }
        }

        /* 闂侀潻闄勫妯好瑰Ο鑽も攳闁斥晛鍟╃槐鏍偓娈垮枛濠€閬嶆偘?- 闁诲繐绻愮换鎰版倵閻戣姤鍋嬮柛顐ゅ枑閹?*/
        .map-info-window {
            position: absolute;
            background: linear-gradient(135deg, rgba(20, 30, 45, 0.98), rgba(25, 40, 60, 0.98));
            border-radius: 8px;
            padding: 12px;
            border: 1.5px solid rgba(77, 171, 247, 0.8);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            color: #e6f7ff;
            font-size: 0.8rem;
            width: 220px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(5px);
            transform-origin: bottom left;
        }

        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translate(-8px, 8px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
        }

        @keyframes slideOut {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(8px, -8px) scale(0.95);
            }
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(77, 171, 247, 0.3);

    async function loadChartData(stationId, days) {
        const historicalResponse = await api.get(`${DATA_API_BASE_URL}/historical/${stationId}?days=10`);
        const predictionResponse = await api.get(`${DATA_API_BASE_URL}/prediction/${stationId}?days=${days}`);

        const historical = historicalResponse && typeof historicalResponse === 'object'
            ? {
                dates: Array.isArray(historicalResponse.dates) ? historicalResponse.dates : [],
                pH: Array.isArray(historicalResponse.pH) ? historicalResponse.pH : [],
                DO: Array.isArray(historicalResponse.DO) ? historicalResponse.DO : [],
                COD: Array.isArray(historicalResponse.COD) ? historicalResponse.COD : [],
                level: Array.isArray(historicalResponse.level) ? historicalResponse.level : []
            }
            : { dates: [], pH: [], DO: [], COD: [], level: [] };

        return {
            historical,
            prediction: transformPredictionSeries(Array.isArray(predictionResponse) ? predictionResponse : [])
        };
    }

    function transformPredictionSeries(predictionRows) {
        const rows = Array.isArray(predictionRows) ? predictionRows : [];
        return {
            dates: rows.map(item => item.date || ''),
            pH: rows.map(item => Number(item.pH ?? null)),
            DO: rows.map(item => Number(item.dissolvedOxygen ?? null)),
            COD: rows.map(item => Number(item.cod ?? null)),
            level: rows.map(item => Number(item.waterLevel ?? null))
        };
    }
    function updateDateTime() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });
        const timeStr = now.toLocaleTimeString('zh-CN');

        const currentDate = document.getElementById('currentDate');
        const currentTime = document.getElementById('currentTime');

        if (currentDate) currentDate.textContent = dateStr;
        if (currentTime) currentTime.textContent = timeStr;
    }

    function updateWarningSlider() {
        const warningSlider = document.getElementById('warningSlider');
        if (!warningSlider) return;

        warningSlider.innerHTML = '';

        if (warningData.length === 0) {
            warningSlider.innerHTML = '<div class="warning-item active">闂佸搫妫楅崐鐟拔涢妶鍡矗闁告洦鍣崝鍛庨崶锝呭⒉濞?/div>';
            return;
        }

        for (let i = 0; i < Math.min(3, warningData.length); i++) {
            const warningIndex = (currentWarningIndex + i) % warningData.length;
            const warning = warningData[warningIndex];

            const warningItem = document.createElement('div');
            warningItem.className = `warning-item ${warning.level || 'medium'}`;

            if (i === 0) warningItem.classList.add('active');
            if (i === 1) warningItem.classList.add('next');
            if (i === 2) warningItem.classList.add('prev');

            warningItem.innerHTML = `
                    <div class="warning-type">
                        <span>${warning.type}</span>
                        <span class="warning-time">${warning.time}</span>
                    </div>
                    <div class="warning-content">${warning.description}</div>
                    <div class="warning-station">濡絽鍟幆?${warning.stationName}</div>
                `;

            warningItem.addEventListener('click', () => {
                const stationIndex = monitoringStations.findIndex(s => s.id === warning.stationId);
                if (stationIndex !== -1) {
                    stopRadarAutoScroll();
                    updateRadarStation(stationIndex);
                    setTimeout(() => {

        let compareStationIndex = (radarStationIndex + 1) % monitoringStations.length;

    // 闂佸吋鍎抽崲鑼躲亹閸モ晝鍗氭繛鍡樺灥娴狀垰螞閻楀牏鐭庡鐟帮躬閺佸秹宕奸悢鍛婃闂佸綊鏅茬欢姘跺焵椤掆偓缁绘垵危閹寸偞鍎熼柨鏃囧亹缁€?
    function getStationColor(station, alpha = 1) {
        const colorMap = {
            'I缂?: '#00a854',
            'II缂?: '#a3d930',
            'III缂?: '#f8e71c',
            'IV缂?: '#ff9800',
            'V缂?: '#ff5722'
        };

        const baseColor = colorMap[station.qualityClass] || '#4dabf7';

        if (alpha === 1) {
            return baseColor;
        } else {
            const r = parseInt(baseColor.slice(1, 3), 16);
            const g = parseInt(baseColor.slice(3, 5), 16);
            const b = parseInt(baseColor.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
    }

    // 闂佸憡甯楃换鍌烇綖閹版澘绀岄柡宓啰顦︽繛鎾寸殰閸愨晝顩柣?

    function updateRightCharts(station) {
        if (!rightChart1 || !rightChart2) return;

        // 闂佸憡鐟ラ崢鏍疾閸洖鐐婇柟瑙勫姂閳?闂佹寧绋掔喊宥夋寘閸曨垰钃熼柟鐐綑閻﹀綊鏌″鍛閻㈩垱鎸鹃幃?

        const statusCounts = monitoringStations.reduce((acc, station) => {

        const rightChart2Option = {

                    {

                    },

        rightChart2.setOption(rightChart2Option);

    // 闂佹眹鍨婚崰鎰板垂濮樿泛瀚夐柛顐ｇ箓椤斿﹪鏌℃担鍝勵暭鐎?
    function generateMonthlyData(baseValue) {
        const data = [];
        for (let i = 0; i < 6; i++) {
            const variation = (Math.random() - 0.5) * 0.4;
            data.push(+(baseValue * (1 + variation)).toFixed(1));
        }
        return data;
    }

    // 闂佸搫娲ら悺銊╁蓟婵犲洤鎹堕柡澶嬪缁傚牏绱撴担鍝勬灆妞?
    function updateMapStats(stats) {
        const mapTotalStations = document.getElementById('mapTotalStations');
        const mapNormalStations = document.getElementById('mapNormalStations');
        const mapWarningStations = document.getElementById('mapWarningStations');
        const mapCriticalStations = document.getElementById('mapCriticalStations');

        // 婵犮垼娉涚€氼噣骞冩繝鍐枖鐎广儱鎳忛崐閬嶆煟閵娿儱顣簍ats闂佸搫绉堕崢褏妲?
        let totalStations = 0, normalStations = 0, warningStations = 0, criticalStations = 0;

        if (stats) {
            if (typeof stats === 'object') {
                totalStations = stats.totalStations || stats.total || 0;
                normalStations = stats.normalStations || stats.normalCount || 0;
                warningStations = stats.warningStations || stats.warningCount || 0;
                criticalStations = stats.criticalStations || stats.criticalCount || 0;
            } else if (typeof stats === 'number') {
                totalStations = stats;
            }
        }

        if (mapTotalStations) mapTotalStations.textContent = totalStations;
        if (mapNormalStations) mapNormalStations.textContent = normalStations;
        if (mapWarningStations) mapWarningStations.textContent = warningStations;
        if (mapCriticalStations) mapCriticalStations.textContent = criticalStations;
    }

    // 闂佸憡甯楃换鍌烇綖閹版澘绀岄柡宥庡幗缁侇偊寮堕崼鐔峰姢婵?
    function initializeRadarChart() {
        const radarContainer = document.getElementById('radarContainer');
        if (!radarContainer) return;

        radarChart = echarts.init(radarContainer, 'dark');

        generateRadarIndicator();

        const prevStationBtn = document.getElementById('prevStation');
        const nextStationBtn = document.getElementById('nextStation');

        if (prevStationBtn) {
            prevStationBtn.addEventListener('click', () => {
                stopRadarAutoScroll();
                prevRadarStation();
                setTimeout(() => {
                    startRadarAutoScroll();
                }, 2000);
            });
        }

        if (nextStationBtn) {
            nextStationBtn.addEventListener('click', () => {
                stopRadarAutoScroll();
                nextRadarStation();
                setTimeout(() => {
                    startRadarAutoScroll();
                }, 2000);
            });
        }
    }

    // 闂佹眹鍨婚崰鎰板垂濮樿埖鈷栭柣銈庡灡瑜把囨煕閵壯冧壕閻庡灚姘ㄧ划鍫ュ传閸曨剛褰?
    function generateRadarIndicator() {
        const indicator = document.getElementById('radarIndicator');
        if (!indicator) return;

        indicator.innerHTML = '';

        monitoringStations.forEach((station, index) => {
            const dot = document.createElement('div');
            dot.className = 'radar-dot';
            if (index === radarStationIndex) {
                dot.classList.add('active');
            }

            dot.addEventListener('click', () => {
                stopRadarAutoScroll();
                updateRadarStation(index);
                setTimeout(() => {
                    startRadarAutoScroll();
                }, 2000);
            });

            indicator.appendChild(dot);
        });
    }

    // 闂佸搫娲ら悺銊╁蓟婵犲洦鈷栭柣銈庡灡瑜把囨煕閵壯冧壕閻庡灚姘ㄧ划鍫ュ传閸曨剛褰?
    function updateRadarIndicator() {
        const dots = document.querySelectorAll('.radar-dot');
        dots.forEach((dot, index) => {
            if (index === radarStationIndex) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    // 婵炴垶鎸搁敃锝囩博鐎涙鈻旀い蹇撴瑜版煡鏌?
    function prevRadarStation() {
        if (monitoringStations.length === 0) return;
        radarStationIndex = (radarStationIndex - 1 + monitoringStations.length) % monitoringStations.length;
        updateRadarStation(radarStationIndex);
    }

    // 婵炴垶鎸搁鍕博鐎涙鈻旀い蹇撴瑜版煡鏌?

        if (monitoringStations.length === 0) return;
        radarStationIndex = (radarStationIndex + 1) % monitoringStations.length;
        updateRadarStation(radarStationIndex);
    }

    // 闂佸搫娲ら悺銊╁蓟婵犲洦鈷栭柣銈庡灡瑜把囨煕閵壯冧壕婵☆垰顦辩划鍫ユ惞鐟欏嫮鏆犵紓浣规⒐閻熝囧磻?

        radarStationIndex = stationIndex;
        const station = monitoringStations[radarStationIndex];

        if (!station) return;

        updateRadarChart();
        updateRadarIndicator();
        updateMapMarkerAnimation();

            radarStationName.textContent = station.name;

        updateLeftCharts(station);
        updateRightCharts(station);

    // 闂佺厧顨庢禍婊勬叏閳哄懎鍙婇柛鎾椾椒绮电紓浣规⒐閻熝囧磻閿濆棛鈹嶉柍鈺佸暕缁辨牜鈧鍠栧﹢閬嶆偘?

                    case 'warning': statusText = '婵☆偅婢樼€氼垶顢?; statusColor = '#ff9800'; break;
                    case 'critical': statusText = '闁烩剝甯掗幊蹇涙偉?; statusColor = '#ff5722'; break;

            const waterQuality = station.waterQuality || {

            infoWindow.innerHTML = `

                            <span>${trendIcon} ${station.trend || '缂備礁顑呴崯鍧楁偩?}</span>
                        </div>
                    </div>
                    <div class="info-metrics">
                        <div class="info-metric">
                            <div class="metric-value" style="color: ${waterQuality.pH < 6.5 || waterQuality.pH > 8.5 ? '#ff5722' : waterQuality.pH < 7.0 || waterQuality.pH > 8.0 ? '#ff9800' : '#4dabf7'}">
                                ${waterQuality.pH.toFixed(1)}
                            </div>
                            <div class="metric-label">pH闂?/div>
                        </div>
                        <div class="info-metric">
                            <div class="metric-value" style="color: ${waterQuality.DO < 2 ? '#ff5722' : waterQuality.DO < 5 ? '#ff9800' : '#4dabf7'}">
                                ${waterQuality.DO.toFixed(1)}
                            </div>
                            <div class="metric-label">濠电姍鍕姸鐞氭瑦鎱?/div>
                        </div>
                        <div class="info-metric">
                            <div class="metric-value" style="color: ${waterQuality.COD > 20 ? '#ff5722' : waterQuality.COD > 15 ? '#ff9800' : '#4dabf7'}">
                                ${waterQuality.COD.toFixed(1)}
                            </div>
                            <div class="metric-label">COD</div>
                        </div>
                        <div class="info-metric">
                            <div class="metric-value" style="color: ${waterQuality.NH3N > 1.0 ? '#ff5722' : waterQuality.NH3N > 0.5 ? '#ff9800' : '#4dabf7'}">
                                ${waterQuality.NH3N.toFixed(2)}
                            </div>
                            <div class="metric-label">濠殿喗菧閸斿秹鎮?/div>
                        </div>
                    </div>
                    <div class="info-tags">
                        ${(station.tags || []).slice(0, 2).map(tag => `<span class="info-tag">${tag}</span>`).join('')}
                        <span class="info-tag">${station.type || '闂佺儵鏅滈崹鍓佺矈鐎靛摜鍗?}</span>
                    </div>
                    <div class="info-arrow"></div>
                `;

            let left = pixelPosition.x + 15;
            let top = pixelPosition.y - 100;

            if (left + 220 > mapRect.width) {
                left = pixelPosition.x - 235;
            }
            if (top < 10) top = 10;
            if (top + 180 > mapRect.height) {
                top = mapRect.height - 190;
            }

            infoWindow.style.left = `${left}px`;
            infoWindow.style.top = `${top}px`;

            mapContainer.appendChild(infoWindow);
            currentInfoWindow = infoWindow;

            const closeBtn = document.getElementById('closeInfoWindow');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    closeInfoWindowWithAnimation();
                });
            }

            autoInfoWindowTimeout = setTimeout(() => {
                closeInfoWindowWithAnimation();
            }, 4000);

            infoWindow.addEventListener('mouseenter', () => {
                if (autoInfoWindowTimeout) {
                    clearTimeout(autoInfoWindowTimeout);
                }
            });

            infoWindow.addEventListener('mouseleave', () => {
                autoInfoWindowTimeout = setTimeout(() => {
                    closeInfoWindowWithAnimation();
                }, 2000);
            });

        }, 300);
    }

    // 闂佺绻戞繛濠偽涚€涙鈹嶉柍鈺佸暕缁辨牜鈧鍠栧﹢閬嶆偘閵夆晜鏅柛顐ｇ箘閺併劑鏌涢弬璇插闁轰線绠栭弫?
    function closeInfoWindowWithAnimation() {
        if (currentInfoWindow) {
            currentInfoWindow.style.animation = 'slideOut 0.3s ease-out forwards';
            setTimeout(() => {
                if (currentInfoWindow) {
                    currentInfoWindow.remove();
                    currentInfoWindow = null;
                }
            }, 300);
        }
        if (autoInfoWindowTimeout) {
            clearTimeout(autoInfoWindowTimeout);
            autoInfoWindowTimeout = null;
        }
    }

    // 闂佺绻戞繛濠偽涚€涙鈹嶉柍鈺佸暕缁辨牜鈧鍠栧﹢閬嶆偘閵夆晜鏅柛顐犲灮瑜板矂鏌涘Δ鈧崯鍧楀矗瑜斿濠氼敇閵娧咁槴
    function closeInfoWindow() {
        if (currentInfoWindow) {
            currentInfoWindow.remove();
            currentInfoWindow = null;
        }
        if (autoInfoWindowTimeout) {
            clearTimeout(autoInfoWindowTimeout);
            autoInfoWindowTimeout = null;
        }
    }

    // 闂佸搫娲ら悺銊╁蓟婵犲洤鎹堕柡澶嬪缁傚牓鏌″鍛┛妞ゆ柨娲畷婵嬪Ω瑜庨弳?
    function updateMapMarkerAnimation() {
        if (!markers || markers.length === 0) return;

        markers.forEach((marker, index) => {
            const markerContent = marker.getContent();
            if (markerContent) {
                if (index === radarStationIndex) {
                    markerContent.classList.add('active-marker');
                } else {
                    markerContent.classList.remove('active-marker');
                }
            }
        });

        const station = monitoringStations[radarStationIndex];
        if (station && map) {
            map.setZoomAndCenter(8, station.coordinates);
        }
    }

    // 闂佸憡甯楃换鍌烇綖閹版澘绀岄柡宥庡幘瑜邦垳鈧灚婢橀崲鎻掞耿閹绢喖鐐?
    function initializeMap() {
        if (typeof AMap === 'undefined') {
            console.error('婵°倕鍊归敋闁汇儱顦靛畷鐑藉级閹稿海顩瑼PI闂佸搫鐗滄禍婊勬叏閻愬瓨濮?);
            return;
        }

        map = new AMap.Map('map', {
            zoom: 5,
            center: [104.0, 35.0],
            mapStyle: 'amap://styles/dark',
            viewMode: '2D',
            resizeEnable: true
        });

        map.addControl(new AMap.ToolBar({ position: 'RT' }));
        map.addControl(new AMap.Scale());

        addStationMarkers();

        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');
        const resetMapBtn = document.getElementById('resetMap');

        if (zoomInBtn) {
            zoomInBtn.addEventListener('click', () => {
                map.zoomIn();
                closeInfoWindowWithAnimation();
            });
        }

        if (zoomOutBtn) {
            zoomOutBtn.addEventListener('click', () => {
                map.zoomOut();
                closeInfoWindowWithAnimation();
            });
        }

        if (resetMapBtn) {
            resetMapBtn.addEventListener('click', () => {
                map.setZoomAndCenter(5, [104.0, 35.0]);
                markers.forEach(marker => {
                    const markerContent = marker.getContent();
                    if (markerContent) {
                        markerContent.classList.remove('active-marker');
                    }
                });
                closeInfoWindowWithAnimation();
            });
        }
    }

    // 濠电儑缍€椤曆勬叏閻愮儤鍎庨柟瀵稿仧閵堝绱掗弮鈧悷褔宕戦敐澶婂唨闁搞儺浜堕崬?
    function addStationMarkers() {
        monitoringStations.forEach((station, index) => {
            // 缂佺虎鍙庨崰鏇犳崲濮樿泛閿ら柟閭﹀幘閸ㄥジ鎮楀☉娅亜锕?
            if (!station.coordinates || !Array.isArray(station.coordinates) || station.coordinates.length !== 2) {
                console.warn('缂備焦姊归悷褔宕戦敐澶婇敜闁归偊鍘鹃崹濂告煛閸愵亜校闁?', station.name, station.coordinates);
                return;
            }

            const markerContent = document.createElement('div');
            markerContent.className = 'custom-marker';
            markerContent.style.backgroundColor = station.color || getStationColor(station);
            markerContent.innerHTML = station.icon || station.name.charAt(0) || '缂?;
            markerContent.title = station.name;

            // 闂佸搫绉烽～澶婄暤娓氣偓閹晠鎳滅喊妯轰壕濞达絿鎳撳鎴︽煕閺冨倸鞋妞ゆ帞鍠栧畷銊︾節閸屾妤呮煟?
            const status = station.status ||
                (station.qualityClass === 'I缂? || station.qualityClass === 'II缂? ? 'normal' :
                    station.qualityClass === 'III缂? ? 'warning' : 'critical');

            if (status === 'warning' || status === 'critical') {
                markerContent.classList.add('warning-marker');
            }

            if (index === radarStationIndex) {
                markerContent.classList.add('active-marker');
            }

            const marker = new AMap.Marker({
                position: station.coordinates,
                content: markerContent,
                offset: new AMap.Pixel(-14, -14),
                title: station.name,
                extData: station
            });

            marker.on('click', function(e) {
                stopRadarAutoScroll();
                updateRadarStation(index);
                setTimeout(() => {
                    startRadarAutoScroll();
                }, 2000);
            });

            marker.setMap(map);
            markers.push(marker);
        });
    }

    // 闂佸搫娲ら悺銊╁蓟婵犲洦鐒诲璺侯槼閸橆剟鏌ｉ妸銉ヮ伀闁绘繍鍨堕幃?
    function updateSelectedStation(stationId) {
        selectedStationId = stationId;

        const station = monitoringStations.find(s => s.id === stationId);
        const selectedStationName = document.getElementById('selectedStationName');
        if (station && selectedStationName) {
            selectedStationName.textContent = station.name;
        }

        updateChartData();
    }

    // 闂佸憡甯楃换鍌烇綖閹版澘绀岄柡宓嫮顩柣?
    function initializeChart() {
        const chartContainer = document.getElementById('chartContainer');
        if (!chartContainer) return;

        currentChart = echarts.init(chartContainer, 'dark');

        const runPredictionBtn = document.getElementById('runPrediction');
        if (runPredictionBtn) {
            runPredictionBtn.addEventListener('click', runPrediction);
        }
    }

    // 闂佸搫娲ら悺銊╁蓟婵犲洤鐐婇柟瑙勫姂閳ь剙鍟村顐︽偋閸繄銈?
    async function updateChartData() {
        const station = monitoringStations.find(s => s.id === selectedStationId);
        if (!station || !currentChart) return;

        const predictionDaysInput = document.getElementById('predictionDays');
        const days = predictionDaysInput ? parseInt(predictionDaysInput.value, 10) || 7 : 7;

        try {
            const chartData = await loadChartData(selectedStationId, days);
            renderChart(station, chartData.historical, chartData.prediction);
        } catch (error) {
            console.error('闁兼儳鍢茶ぐ鍥炊閹规劑鈧啴寮悧鍫濈ウ濠㈡儼绮剧憴?', error);
            renderChart(station, { dates: [], pH: [], DO: [], COD: [], level: [] }, { dates: [], pH: [], DO: [], COD: [], level: [] });
            showNotification('鏈姞杞藉埌鐪熷疄鍘嗗彶/棰勬祴鏁版嵁', 'warning');
        }
    }
    function renderChart(station, historicalData, predictedData) {
        if (!currentChart) return;

        if (!historicalData || !Array.isArray(historicalData.dates) || historicalData.dates.length === 0) {
            currentChart.setOption({
                title: {
                    text: '暂无真实历史/预测数据',
                    left: 'center',
                    top: 'center',
                    textStyle: {
                        color: '#80d4ff',
                        fontSize: 14
                    }
                },
                xAxis: { data: [] },
                series: []
            });
            return;
        }

        // 闁荤姳绶ょ槐鏇㈡偩鐠囧樊娼╃紓鍫㈠Х缁夋挳鏌℃担鍝勵暭鐎规挷绶氶幆鍐礋椤旇偐妲洪梺鎼炲劥閹活亞妲愬┑瀣仺闁靛鍊楅懝楣冩偣娴ｇ鈷旈柣銈呮晲闁哄鍋炲娆撳春閵忊剝鍎?
        const levelData = historicalData.level;
        let minLevel = Math.min(...levelData);
        let maxLevel = Math.max(...levelData);

        // 缂佺虎鍙庨崰鏇犳崲濮橆剦娼╃紓鍫㈠Х缁夌闁哄鍋涢悺銊ワ耿娓氣偓瀹曘儵宕奸姀鈥斥偓鐐烘煟閵娿儱顏悗鍨墵瀹?
        if (minLevel === maxLevel) {
            minLevel = minLevel * 0.9;
            maxLevel = maxLevel * 1.1;
        } else {
            minLevel = minLevel * 0.95;
            maxLevel = maxLevel * 1.05;
        }

        // 闁荤姳绶ょ槐鏇㈡偩鐠囧樊娼╃痪鎯ь儏缁愭盯鏌熺粙鎸庡闁绘牭缍侀幆鍐礋椤旇偐妲洪梺?
        const phData = historicalData.pH;
        const doData = historicalData.DO;
        const codData = historicalData.COD;

        const allQualityData = [...phData, ...doData, ...codData];
        const minQuality = Math.min(...allQualityData) * 0.9;
        const maxQuality = Math.max(...allQualityData) * 1.1;

        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(20, 30, 45, 0.95)',
                borderColor: 'rgba(0, 150, 255, 0.6)',
                textStyle: { color: '#e6f7ff' },
                formatter: function(params) {
                    let result = params[0].name + '<br/>';
                    params.forEach(item => {
                        let unit = '';
                        if (item.seriesName === 'pH闂?) unit = '';
                        else if (item.seriesName === '濠电姍鍕姸鐞氭瑦鎱?) unit = ' mg/L';
                        else if (item.seriesName === 'COD') unit = ' mg/L';
                        else if (item.seriesName === '濠殿喗顭囩换婵堢礊?) unit = ' m';

                        result += `${item.seriesName}: ${item.value}${unit}<br/>`;
                    });
                    return result;
                }
            },
            legend: {
                data: ['pH闂?, '濠电姍鍕姸鐞氭瑦鎱?, 'COD', '濠殿喗顭囩换婵堢礊?],
                top: 5,
                textStyle: {
                    color: '#b3e0ff',
                    fontSize: 10
                },
                itemWidth: 12,
                itemHeight: 8
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '12%',
                top: '20%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: historicalData.dates,
                axisLine: {
                    lineStyle: { color: '#80d4ff' }
                },
                axisLabel: {
                    color: '#b3e0ff',
                    rotate: 45,
                    fontSize: 9
                }
            },
            yAxis: [
                {
                    type: 'value',
                    name: '濠殿喗顭囬ˉ鎰啅濠靛绠伴柛銉ｅ妿閸?,
                    position: 'left',
                    axisLine: {
                        lineStyle: { color: '#80d4ff' }
                    },
                    axisLabel: {
                        color: '#b3e0ff',
                        fontSize: 9,
                        formatter: function(value) {
                            return value.toFixed(1);
                        }
                    },
                    splitLine: {
                        lineStyle: {
                            color: 'rgba(128, 212, 255, 0.1)'
                        }
                    },
                    min: minQuality,
                    max: maxQuality
                },
                {
                    type: 'value',
                    name: '濠殿喗顭囩换婵堢礊?m)',
                    position: 'right',
                    axisLine: {
                        lineStyle: { color: '#f8e71c' }
                    },
                    axisLabel: {
                        color: '#f8e71c',
                        fontSize: 9,
                        formatter: function(value) {
                            return value.toFixed(1);
                        }
                    },
                    splitLine: {
                        show: false
                    },
                    min: minLevel,
                    max: maxLevel
                }
            ],
            series: [
                {
                    name: 'pH闂?,
                    type: 'line',
                    smooth: true,
                    data: historicalData.pH,
                    lineStyle: {
                        color: '#37d3a0',
                        width: 2
                    },
                    itemStyle: { color: '#37d3a0' },
                    symbolSize: 3
                },
                {
                    name: '濠电姍鍕姸鐞氭瑦鎱?,
                    type: 'line',
                    smooth: true,
                    data: historicalData.DO,
                    lineStyle: {
                        color: '#4dabf7',
                        width: 2
                    },
                    itemStyle: { color: '#4dabf7' },
                    symbolSize: 3
                },
                {
                    name: 'COD',
                    type: 'line',
                    smooth: true,
                    data: historicalData.COD,
                    lineStyle: {
                        color: '#ff9800',
                        width: 2
                    },
                    itemStyle: { color: '#ff9800' },
                    symbolSize: 3
                },
                {
                    name: '濠殿喗顭囩换婵堢礊?,
                    type: 'line',
                    smooth: true,
                    yAxisIndex: 1,
                    data: historicalData.level,
                    lineStyle: {
                        color: '#f8e71c',
                        width: 2
                    },
                    itemStyle: { color: '#f8e71c' },
                    symbolSize: 3
                },
                {
                    name: '婵☆偅婢樼€氼厾绮?,
                    type: 'line',
                    smooth: true,
                    yAxisIndex: 0,
                    data: [...Array(historicalData.pH.length).fill(null), ...predictedData.pH],
                    lineStyle: {
                        color: '#37d3a0',
                        width: 2,
                        type: 'dashed'
                    },
                    itemStyle: { color: '#37d3a0' },
                    symbol: 'none'
                }
            ]
        };

        currentChart.setOption(option);
    }

    // 闂佹眹鍨婚崰鎰板垂濮樿泛鍌ㄩ柛鈩冾殔閽戝鏌℃担鍝勵暭鐎规挷绶氶弫宥夊醇閻斿奔绶氶獮蹇涙偆閸屾粎顦?
    function generateHistoricalData(station) {
        const dates = [];
        const pH = [];
        const DO = [];
        const COD = [];
        const level = [];

        const today = new Date();
        for (let i = 9; i >= 0; i--) {
            const date = new Date(today);
            date.setDate(date.getDate() - i);
            dates.push(`${date.getMonth()+1}/${date.getDate()}`);

            const waterQuality = station.waterQuality || {
                pH: 7.0,
                DO: 5.0,
                COD: 10.0,
                level: 20.0
            };

            const basePH = waterQuality.pH;
            const baseDO = waterQuality.DO;
            const baseCOD = waterQuality.COD;
            const baseLevel = waterQuality.level;

            pH.push(+(basePH + (Math.random() - 0.5) * 0.3).toFixed(2));
            DO.push(+(baseDO + (Math.random() - 0.5) * 0.5).toFixed(2));
            COD.push(+(baseCOD + (Math.random() - 0.5) * 1.5).toFixed(2));
            level.push(+(baseLevel + (Math.random() - 0.5) * 0.3).toFixed(2));
        }

        return { dates, pH, DO, COD, level };
    }

    // 闂佹眹鍨婚崰鎰板垂濮橆叏绱ｉ柛鏇ㄥ墰閵堟挳鏌℃担鍝勵暭鐎规挷绶氶弫宥夊醇閻斿奔绶氶獮蹇涙偆閸屾粎顦?
    async function runPrediction() {
        const station = monitoringStations.find(s => s.id === selectedStationId);
        if (!station) return;

        const predictionDaysInput = document.getElementById('predictionDays');
        const days = predictionDaysInput ? parseInt(predictionDaysInput.value, 10) || 7 : 7;

        const btn = document.getElementById('runPrediction');
        if (!btn) return;

        const originalText = btn.innerHTML;
        btn.innerHTML = '<span>...</span> 预测中';
        btn.disabled = true;

        try {
            const response = await axios.post(`${DATA_API_BASE_URL}/prediction/run`, { stationId: selectedStationId, days });
            if (!response.data || response.data.code !== 200) {
                throw new Error((response.data && (response.data.message || response.data.msg)) || '预测接口执行失败');
            }

            await updateChartData();
            showNotification(`宸插埛鏂版湭鏉?${days} 澶╃殑鐪熷疄棰勬祴鏁版嵁`, 'success');
        } catch (error) {
            console.error('预测失败:', error);
            console.error('棰勬祴澶辫触:', error);
            showNotification('棰勬祴鎺ュ彛鎵ц澶辫触', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.style.position = 'fixed';
        notification.style.top = '20px';
        notification.style.right = '20px';
        notification.style.padding = '10px 15px';
        notification.style.borderRadius = '6px';
        notification.style.zIndex = '10000';
        notification.style.fontSize = '0.85rem';
        notification.style.maxWidth = '280px';
        notification.style.boxShadow = '0 4px 12px rgba(0, 0, 0, 0.5)';
        notification.style.transition = 'all 0.3s';
        notification.style.transform = 'translateX(100px)';
        notification.style.opacity = '0';

        if (type === 'success') {
            notification.style.background = 'linear-gradient(135deg, rgba(0, 168, 84, 0.9), rgba(0, 135, 68, 0.9))';
            notification.style.border = '1px solid rgba(0, 168, 84, 0.6)';
        } else if (type === 'error') {
            notification.style.background = 'linear-gradient(135deg, rgba(255, 87, 34, 0.9), rgba(200, 60, 20, 0.9))';
            notification.style.border = '1px solid rgba(255, 87, 34, 0.6)';
        } else if (type === 'warning') {
            notification.style.background = 'linear-gradient(135deg, rgba(255, 152, 0, 0.9), rgba(200, 120, 0, 0.9))';
            notification.style.border = '1px solid rgba(255, 152, 0, 0.6)';
        } else {
            notification.style.background = 'linear-gradient(135deg, rgba(77, 171, 247, 0.9), rgba(50, 130, 200, 0.9))';
            notification.style.border = '1px solid rgba(77, 171, 247, 0.6)';
        }

        notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-size: 1rem;">${
            type === 'success' ? '闂? :
                type === 'error' ? '闂? :
                    type === 'warning' ? '闂佸疇娉曟刊瀵哥箔? :
                        '闂佹枼鏅濆▍銏㈢箔?
        }</span>
                    <span>${message}</span>
                </div>
            `;

        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.transform = 'translateX(0)';
            notification.style.opacity = '1';
        }, 10);

        setTimeout(() => {
            notification.style.transform = 'translateX(100px)';
            notification.style.opacity = '0';
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
            }, 300);
        }, 3000);
    }

    // 缂備焦鍔栭〃鍛般亹濞戞瑥绶炵憸宥夋儍椤掑嫬鐭楁俊顖氭惈椤曆囨煛閸愨晛鍔堕柣銊у枛瀵偊寮堕幋鐐殿洯闁?
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            // 闁荤姴顑呴崯顖炲汲閿濆绠ラ柍褜鍓熷鍨緞婵犲啰顩柣鐐寸◤閸斿矂濡甸崶鈺€鐒?
            if (currentChart) currentChart.resize();
            if (radarChart) radarChart.resize();
            if (leftChart1) leftChart1.resize();
            if (leftChart2) leftChart2.resize();
            if (leftChart3) leftChart3.resize();
            if (rightChart1) rightChart1.resize();
            if (rightChart2) rightChart2.resize();

            // 閻庢鍠栭幖顐﹀春濡ゅ懏鐓傜€广儱妫欓悡鈧柟鐓庣摠濮婂寮妶澶婄闁靛鍎冲宀勬煛瀹ュ懎妲荤紒?
            if (window.innerWidth > 1200) {
                const mainContent = document.querySelector('.main-content');
                const leftPanel = document.querySelector('.left-panel');
                const rightPanel = document.querySelector('.right-panel');
                const header = document.querySelector('.header');
                const headerRight = document.querySelector('.header-right');

                if (mainContent) {
                    mainContent.style.cssText = 'display: grid !important; grid-template-columns: 320px 1fr 320px !important; min-height: 720px !important; max-height: 85vh !important; height: auto !important; gap: 10px !important;';
                }

                if (leftPanel) {
                    leftPanel.style.cssText = 'display: grid !important; grid-template-rows: 140px 140px 1fr 1fr !important; grid-template-columns: 100% !important; height: 100% !important; gap: 10px !important;';
                }

                if (rightPanel) {
                    rightPanel.style.cssText = 'flex-direction: column !important; height: 100% !important; gap: 10px !important;';
                }

                if (header) {
                    header.style.cssText = 'flex-direction: row !important; justify-content: center !important; padding: 15px !important;';
                }

                if (headerRight) {
                    headerRight.style.cssText = 'position: absolute !important; right: 15px !important; flex-direction: row !important; align-items: center !important;';
                }
            }
        }, 150);
    });

    // 婵＄偑鍊楅弫璇差焽娴兼潙绀夐柣妯煎劋缁佷即鏌涘顒勵€楃紒杈ㄥ灦閹便劎鈧綆浜滈悘銉モ攽椤旂⒈鍎忛悗?
    window.addEventListener('DOMContentLoaded', function() {
        // 濠碘槅鍋€閸嬫捇鏌＄仦璇插姎缂佺儵鍋撻柣鐔告磻濞村洨绮婇鈶╂敠闁规澘澧庣粈澶娒归敐鍛棞鐎规挸妫欓幏鍛崉閵娿儳绠掗柣蹇撶箲閸ㄥ磭寮ч崘顏冪剨婵犻潧锕﹀Σ鎼佹煕閹烘挾绠撴い顐ｅ姍瀹?
        const missingResources = [];
        if (typeof AMap === 'undefined') missingResources.push('婵°倕鍊归敋闁汇儱顦靛畷鐑藉级閹稿海顩?);
        if (typeof echarts === 'undefined') missingResources.push('ECharts闂佹悶鍎插畷姗€濡撮崘鈺傚劅?);
        if (typeof axios === 'undefined') missingResources.push('Axios HTTP闁?);

        if (missingResources.length > 0) {
            console.warn('婵炲濮伴崕鎵箔閸涱垱灏庨柛鏇ㄥ墰閻栭亶鏌￠崼顐＄盎濠殿喚鍋炲?', missingResources.join(', '));
            showNotification(`閮ㄥ垎璧勬簮鍔犺浇澶辫触: ${missingResources.join(', ')}`, 'warning');
        }

        // 閻庣偣鍊栭崕鑲╂崲濠婂牆绀嗘繝闈涙－濞兼鏌涢弽銊у缂佽鲸绻勫☉鐢割敊閼姐倗顔旈梺鍦暯閸嬫捇鏌￠崼婵愭Ъ缂佷緡鍋勯埞鍐箛閺夊灝骞嬮梺鍝勭墕椤︽澘鈹冮埀顒€霉閸忚壈澹樺┑顔惧仦濞?
        setTimeout(() => {
            initApplication();
        }, 500);
    });
</script>
